services:
  finansas:
    build: .
    container_name: finansas
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://finansas:finansas@finansas-db:5432/finansas}
      NEXTAUTH_SECRET: ${NEXTAUTH_SECRET:?NEXTAUTH_SECRET is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      UPLOADS_DIR: /data/uploads
      NEXT_PUBLIC_LOCALE: ${NEXT_PUBLIC_LOCALE:-en}
      NEXT_PUBLIC_CURRENCY: ${NEXT_PUBLIC_CURRENCY:-USD}
      NEXT_PUBLIC_DATE_FORMAT: ${NEXT_PUBLIC_DATE_FORMAT:-mdy}
      NEXT_PUBLIC_TIME_FORMAT: ${NEXT_PUBLIC_TIME_FORMAT:-12}
    volumes:
      - uploads:/data/uploads
    depends_on:
      finansas-db:
        condition: service_healthy
        required: false

  finansas-db:
    image: postgres:16-alpine
    container_name: finansas-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: finansas
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-finansas}
      POSTGRES_DB: finansas
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U finansas"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  pgdata:
  uploads:
