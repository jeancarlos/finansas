services:
  finansas:
    image: jeansouza/finansas:latest
    container_name: finansas
    restart: unless-stopped
    ports:
      - "${PORT:-3000}:3000"
    environment:
      DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
      NEXTAUTH_URL: ${NEXTAUTH_URL:-http://localhost:3000}
      UPLOADS_DIR: /data/uploads
      NEXT_PUBLIC_LOCALE: ${NEXT_PUBLIC_LOCALE:-en}
      NEXT_PUBLIC_CURRENCY: ${NEXT_PUBLIC_CURRENCY:-USD}
      NEXT_PUBLIC_DATE_FORMAT: ${NEXT_PUBLIC_DATE_FORMAT:-mdy}
      NEXT_PUBLIC_TIME_FORMAT: ${NEXT_PUBLIC_TIME_FORMAT:-12}
    volumes:
      - uploads:/data/uploads
      - config:/data/config

volumes:
  uploads:
  config:
